name: Build ISO

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  DIST: bookworm
  NIGHTMARE_APT_REPO: ${{ vars.NIGHTMARE_APT_REPO || '' }}

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            live-build grub-pc-bin grub-efi-amd64-bin mtools xorriso rsync \
            build-essential bc bison flex libssl-dev libncurses-dev

      - name: Add Nightmare package repository (optional)
        if: env.NIGHTMARE_APT_REPO != ''
        run: |
          echo "deb ${NIGHTMARE_APT_REPO} ./" | sudo tee /etc/apt/sources.list.d/nightmare.list
          sudo apt-get update

      - name: Configure live-build
        run: sudo DIST="${DIST}" ENABLE_SECURITY_REPO=false ./scripts/setup-live-build.sh

      - name: Build ISO
        run: sudo DIST="${DIST}" ./scripts/build-iso.sh

      - name: Fix ownership for artifacts
        run: sudo chown -R "$USER:$USER" build

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: nightmare-live-iso
          path: build/live/*.iso
          if-no-files-found: error
